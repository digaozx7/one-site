<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Visual de Redes para Automação</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #18bc9c;
            --dark: #34495e;
            --light: #ecf0f1;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            color: var(--text);
        }

        header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }

        p.subtitle {
            margin: 0.5rem 0 0 0;
            opacity: 0.8;
        }

        /* Sistema de Abas */
        .tabs-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            border-bottom: 3px solid var(--primary);
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: var(--light);
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s ease;
            color: var(--dark);
        }

        .tab-btn:hover {
            background: #e2e8f0;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Aba 1: Cards de Cabos */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 5px solid var(--secondary);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            color: var(--primary);
        }

        .cable-explanation {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed #ddd;
            color: #555;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Aba 2: Topologias */
        .topology-menu {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .topo-btn {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .topo-btn:hover, .topo-btn.active {
            background: var(--primary);
            color: white;
        }

        .topology-display {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .topology-display.active {
            display: block;
        }

        .lists-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .pros-cons-box {
            padding: 1rem;
            border-radius: 6px;
        }

        .pros { background-color: #e8f8f5; border-left: 4px solid #2ecc71; }
        .cons { background-color: #fdf2f2; border-left: 4px solid #e74c3c; }

        .pros h4 { color: #27ae60; margin-top: 0; }
        .cons h4 { color: #c0392b; margin-top: 0; }

        ul { padding-left: 1.2rem; margin-bottom: 0; }
        li { margin-bottom: 0.5rem; }
